image: python:3.12

stages:
  - lint
  - test

lint:
  stage: lint
  image: registry.gitlab.com/pipeline-components/flake8:latest
  script:
    - pip install -r requirements/test.txt
    - flake8 lyceum

black:
  stage: lint
  image: registry.gitlab.com/pipeline-components/black:latest
  script:
    - black --check lyceum

django:
  stage: test
  script:
    - pip install -r requirements/test.txt
    - cd lyceum
    - python3 manage.py test