{% extends "base.html" %}
{% load i18n %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="alert alert-success" role="alert">
          <h4 class="alert-heading">{% translate "Успешно!" %}</h4>
          <p>
            {% translate "Пароль был успешно восстановлен. Вы можете войти в свою учетную запись с новым паролем." %}
          </p>
          <hr>
          <p class="mb-0"><a href="{% url 'users:login' %}">{% translate "Войти" %}</a></p>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
