{% extends "base.html" %}
{% load i18n %}
{% block title %}{% translate "Обратная связь" %}{% endblock %}

{% block content %}
  <h1>{{ title }}</h1>

  {% if messages %}
    {% for message in messages %}
      <div style="color: green; font-weight: bold; margin-bottom: 20px">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <ul>
      {{ form.as_ul }}
    </ul>
    <button type="submit" class="btn btn-primary">Отправить</button>
  </form>
{% endblock %}
