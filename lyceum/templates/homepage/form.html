{% extends "base.html" %}
{% block title %}Текстовая форма{% endblock %}

{% block content %}
  <h1>Текстовая форма</h1>

  {% if messages %}
    {% for message in messages %}
      <div style="color: green; font-weight: bold; margin-bottom: 20px">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form action="{% url 'homepage:echo_submit' %}" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Отправить</button>
</form>
{% endblock %}
